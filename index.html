<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Batphone Calendar Charges</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; }
    h2 { color: #333; }
    form, #dashboard { margin-top: 20px; }
    input, button { margin: 5px; padding: 8px; }
    table { border-collapse: collapse; margin-top: 20px; width: 100%; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
    th { background-color: #f2f2f2; }
  </style>
</head>
<body>
  <h2>Login</h2>
  <form id="loginForm">
    <input type="text" id="username" placeholder="Username" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>

  <div id="dashboard" style="display:none;">
    <h2>Charge Calculator</h2>
    <label>Start Date: <input type="date" id="startDate"></label>
    <label>End Date: <input type="date" id="endDate"></label>
    <button onclick="calculate()">Calculate</button>

    <table id="resultTable">
      <thead>
        <tr><th>Date</th><th>Type</th><th>Charge (₹)</th></tr>
      </thead>
      <tbody></tbody>
    </table>
    <h3 id="total"></h3>
  </div>

  <script>
    // Example India holiday list for 2026 (expand as needed)
    const holidays = ["2026-01-26","2026-08-15","2026-10-02","2026-12-25"];

    // Simple login check
    document.getElementById("loginForm").onsubmit = function(e){
      e.preventDefault();
      const user = document.getElementById("username").value;
      const pass = document.getElementById("password").value;
      if(user === "admin" && pass === "1234"){  // demo credentials
        document.getElementById("dashboard").style.display = "block";
        alert("Login successful!");
      } else {
        alert("Invalid credentials");
      }
    }

    function calculate(){
      let start = new Date(document.getElementById("startDate").value);
      let end = new Date(document.getElementById("endDate").value);
      let tbody = document.querySelector("#resultTable tbody");
      tbody.innerHTML = "";
      let total = 0;

      for(let d = new Date(start); d <= end; d.setDate(d.getDate()+1)){
        let dateStr = d.toISOString().split("T")[0];
        let weekday = d.getDay(); // 0=Sun, 6=Sat
        let type, charge;

        if(holidays.includes(dateStr)){
          type = "Holiday";
          charge = 4000;
        } else if(weekday === 0 || weekday === 6){
          type = "Weekend";
          charge = 4000;
        } else {
          type = "Weekday";
          charge = 2400;
        }

        total += charge;
        let row = `<tr><td>${dateStr}</td><td>${type}</td><td>${charge}</td></tr>`;
        tbody.innerHTML += row;
      }

      document.getElementById("total").innerText = "Total Amount: ₹" + total;
    }
  </script>
</body>
</html>
